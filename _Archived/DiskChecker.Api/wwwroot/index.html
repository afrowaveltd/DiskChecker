<!-- DiskChecker.Api/wwwroot/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>DiskChecker - SignalR Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>
    <h1>DiskChecker - SignalR Test (NO Blazor Server)</h1>
    
    <div id="status">Connecting...</div>
    
    <button onclick="startTest()">Start Disk Test</button>
    <div id="result"></div>
    <div id="progress"></div>

    <script>
        // ✅ This is STATELESS SignalR - NO Blazor Server circuit!
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/hubs/disktest")
            .withAutomaticReconnect()
            .build();

        connection.on("ProgressUpdate", (progress) => {
            document.getElementById('progress').innerHTML = 
                `Progress: ${progress.percentComplete.toFixed(1)}% - ${progress.currentSpeed.toFixed(1)} MB/s`;
        });

        async function startTest() {
            const requestId = crypto.randomUUID();
            
            try {
                // Request/Response pattern - just like REST API!
                const response = await connection.invoke("StartDiskTest", {
                    requestId: requestId,
                    diskPath: "D:",
                    profile: "HDD_FULL"
                });

                // Check response has matching requestId
                if (response.requestId === requestId) {
                    if (response.success) {
                        document.getElementById('result').innerHTML = 
                            `✅ Test completed: ${JSON.stringify(response.result)}`;
                    } else {
                        document.getElementById('result').innerHTML = 
                            `❌ Error: ${response.error}`;
                    }
                }

                // Subscribe to progress updates
                await connection.invoke("SubscribeToTestProgress", response.result.testId);
            } catch (err) {
                console.error(err);
                document.getElementById('result').innerHTML = `❌ Failed: ${err}`;
            }
        }

        // Start connection
        connection.start()
            .then(() => {
                document.getElementById('status').innerHTML = '✅ Connected to SignalR';
                console.log('SignalR connected');
            })
            .catch(err => {
                document.getElementById('status').innerHTML = '❌ Connection failed';
                console.error('SignalR error:', err);
            });
    </script>
</body>
</html>
