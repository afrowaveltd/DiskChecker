<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for better visibility -->
  <circle cx="128" cy="128" r="120" fill="#2c3e50" opacity="0.1"/>
  
  <!-- Hard Disk Body (main rectangle) -->
  <rect x="48" y="80" width="160" height="96" rx="8" fill="#34495e" stroke="#2c3e50" stroke-width="4"/>
  
  <!-- Disk platter circles (inside) -->
  <circle cx="90" cy="128" r="28" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
  <circle cx="166" cy="128" r="28" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
  
  <!-- Disk center dots -->
  <circle cx="90" cy="128" r="8" fill="#2c3e50"/>
  <circle cx="166" cy="128" r="8" fill="#2c3e50"/>
  
  <!-- LED indicator (green - healthy) -->
  <rect x="56" y="88" width="8" height="8" rx="2" fill="#27ae60"/>
  
  <!-- Health badge (circular background) -->
  <circle cx="200" cy="64" r="32" fill="#27ae60" stroke="#fff" stroke-width="4"/>
  
  <!-- Checkmark inside badge -->
  <path d="M 188 64 L 196 72 L 212 52" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Disk label line -->
  <rect x="56" y="152" width="40" height="4" rx="2" fill="#7f8c8d"/>
  <rect x="56" y="160" width="60" height="4" rx="2" fill="#7f8c8d"/>
</svg>
